    button:
      copy: Копіювати
      refresh: Оновити

  percentage-calculator:
    title: Калькулятор відсотків
    description: Легко обчислюйте відсотки від одного значення до іншого або від відсотка до значення.

  svg-placeholder-generator:
    title: Генератор SVG-заповнювачів
    description: Генеруйте SVG-зображення для використання як заповнювачів у ваших застосунках.

  json-to-csv:
    title: JSON у CSV
    description: Конвертуйте JSON у CSV з автоматичним визначенням заголовків.

  camera-recorder:
    title: Запис з камери
    description: Зробіть фото або запишіть відео з вашої веб-камери або камери.

  keycode-info:
    title: Інформація про код клавіші
    description: Знайдіть JavaScript keycode, код, розташування та модифікатори будь-якої натиснутої клавіші.

  emoji-picker:
    title: Вибір emoji
    description: Легко копіюйте та вставляйте emoji і отримуйте значення unicode та code points кожного emoji.

  color-converter:
    title: Конвертер кольорів
    description: Конвертуйте кольори між різними форматами (hex, rgb, hsl та назва CSS).

  bcrypt:
    title: Bcrypt
    description: Хешуйте та порівнюйте рядки тексту за допомогою bcrypt. Bcrypt — це функція хешування паролів на основі шифру Blowfish.

  crontab-generator:
    title: Генератор Crontab
    description: Перевіряйте та генеруйте вирази crontab і отримуйте зрозумілий опис розкладу cron.

  http-status-codes:
    title: HTTP-коди статусу
    description: Список усіх HTTP-кодів статусу, їх назв та значень.

  sql-prettify:
    title: Форматування SQL
    description: Форматуйте та прикрашайте ваші SQL-запити онлайн (підтримує різні діалекти SQL).

  benchmark-builder:
    title: Конструктор бенчмарків
    description: Легко порівнюйте час виконання завдань за допомогою цього онлайн-конструктора бенчмарків.

  git-memo:
    title: Шпаргалка з Git
    description: Git — децентралізоване програмне забезпечення для керування версіями. Ця шпаргалка надасть швидкий доступ до найпоширеніших команд git.

  slugify-string:
    title: Перетворення рядка на slug
    description: Зробіть рядок безпечним для URL, імен файлів та ідентифікаторів.

