    description: Калькулятор ETA (орієнтовний час прибуття) для визначення приблизного часу завершення завдання.

  roman-numeral-converter:
    title: Конвертер римських цифр
    description: Конвертуйте римські цифри в арабські і навпаки.

  hmac-generator:
