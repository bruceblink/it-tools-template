  text-to-unicode:
    title: Текст у Unicode
    description: Аналізуйте та конвертуйте текст у Unicode і навпаки.

  ipv4-range-expander:
    title: Розширювач діапазону IPv4
    description: За початковою та кінцевою IPv4-адресами цей інструмент обчислює дійсну підмережу IPv4 з її нотацією CIDR.

  text-diff:
    title: Порівняння тексту
    description: Порівнюйте два тексти і дивіться різницю між ними.

  otp-generator:
    title: Генератор OTP-кодів
    description: Генеруйте та перевіряйте одноразові паролі (OTP) на основі часу для багатофакторної аутентифікації.

  url-encoder:
    title: Кодування/декодування URL-рядків
    description: Кодуйте текст у URL-формат (також відомий як "відсоткове кодування") або декодуйте з нього.

  text-to-binary:
    title: Текст у двійковий ASCII
    description: Конвертуйте текст у двійкове ASCII-представлення і навпаки.
