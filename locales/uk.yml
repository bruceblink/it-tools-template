    description: UUID (Universally Unique Identifier) — це 128-бітне число, що використовується для ідентифікації інформації в комп'ютерних системах.

  ipv4-address-converter:
    title: Конвертер IPv4-адрес
    description: Конвертуйте IP-адресу в десяткове, двійкове, шістнадцяткове або навіть IPv6-представлення.

  text-statistics:
