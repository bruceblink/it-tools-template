    title: Шифрування / розшифрування тексту
    description: Шифруйте відкритий текст і розшифровуйте зашифрований текст за допомогою алгоритмів AES, TripleDES, Rabbit або RC4.

  random-port-generator:
    title: Генератор випадкових портів
    description: Генеруйте випадкові номери портів поза діапазоном "відомих" портів (0-1023).

  yaml-prettify:
    title: Форматування YAML
    description: Прикрасьте ваш YAML-рядок у зручний для читання формат.

  eta-calculator:
