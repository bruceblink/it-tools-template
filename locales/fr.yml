  text-diff:
    title: Différences de texte
    description: Comparez deux textes et voyez les différences entre eux.

  otp-generator:
    title: Générateur de codes OTP
    description: Générez et validez des mots de passe à usage unique (OTP) basés sur le temps pour l'authentification multifacteur.

  url-encoder:
    title: Encoder/décoder des chaînes URL
    description: Encodez du texte au format URL (également connu sous le nom de "encodage pourcent"), ou décodez-le depuis ce format.

  text-to-binary:
    title: Texte vers binaire ASCII
    description: Convertissez du texte en sa représentation binaire ASCII et vice-versa.
