  ipv4-subnet-calculator:
    title: Calculateur de sous-réseau IPv4
    description: Analysez vos blocs CIDR IPv4 et obtenez toutes les informations sur votre sous-réseau.

  og-meta-generator:
    title: Générateur de méta Open Graph
    description: Générez des métabalises HTML Open Graph et sociales pour votre site web.

  ipv6-ula-generator:
    title: Générateur d'IPv6 ULA
    description: Générez vos propres adresses IP locales non-routables pour votre réseau selon la RFC4193.

  hash-text:
    title: Hachage de texte
    description: 'Hachez une chaîne de texte en utilisant la fonction souhaitée : MD5, SHA1, SHA256, SHA224, SHA512, SHA384, SHA3 ou RIPEMD160'

  json-to-toml:
    title: JSON vers TOML
    description: Analysez et convertissez JSON en TOML.

  device-information:
    title: Informations sur l'appareil
    description: Obtenez des informations sur votre appareil actuel (taille de l'écran, ratio de pixels, user agent, ...).

  pdf-signature-checker:
