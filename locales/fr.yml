  yaml-to-json-converter:
    title: Convertisseur YAML vers JSON
    description: Convertissez simplement du YAML en JSON avec ce convertisseur en ligne.

  uuid-generator:
    title: Générateur d'UUIDs
    description: Un UUID (Universally Unique Identifier) est un nombre de 128 bits utilisé pour identifier des informations dans les systèmes informatiques.

  ipv4-address-converter:
    title: Convertisseur d'adresses IPv4
    description: Convertissez une adresse IP en décimal, binaire, hexadécimal ou même en représentation IPv6.

  text-statistics:
