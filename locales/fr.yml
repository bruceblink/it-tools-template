  token-generator:
    title: Générateur de token
    description: >-
      Génère une chaîne aléatoire avec les caractères que vous voulez, lettres
      majuscules ou minuscules, chiffres et/ou symboles.
    uppercase: Majuscules (ABC...)
    lowercase: Minuscules (abc...)
    numbers: Chiffres (123...)
    symbols: Symboles (!-;...)
    button:
      copy: Copier
      refresh: Rafraichir
    copied: Le token a été copié
    length: Longueur
    tokenPlaceholder: Le token...

  password-strength-analyser:
    title: Analyseur de force des mots de passe
    description: Découvrez la force de votre mot de passe avec cet analyseur de force côté client et outil d'estimation du temps de craquage.

  chronometer:
    title: Chronomètre
    description: Mesurez la durée d'une tâche. Un simple chronomètre avec des fonctionnalités basiques.

  percentage-calculator:
    title: Calculateur de pourcentages
    description: Calculez facilement des pourcentages d'une valeur à une autre, ou d'un pourcentage à une valeur.

  svg-placeholder-generator:
    title: Générateur de placeholder SVG
    description: Générez des images SVG à utiliser comme placeholders dans vos applications.

  json-to-csv:
    title: JSON vers CSV
    description: Convertissez du JSON en CSV avec détection automatique des en-têtes.

  camera-recorder:
    title: Enregistreur de caméra
    description: Prenez une photo ou enregistrez une vidéo depuis votre webcam ou caméra.

  keycode-info:
    title: Informations sur le code de touche
    description: Trouvez le keycode JavaScript, le code, la position et les modificateurs de n'importe quelle touche.

  emoji-picker:
    title: Sélecteur d'emoji
    description: Copiez et collez des emojis facilement et obtenez les valeurs unicode et code points de chaque emoji.

  color-converter:
    title: Convertisseur de couleurs
    description: Convertissez les couleurs entre différents formats (hex, rgb, hsl et nom CSS).

  bcrypt:
    title: Bcrypt
    description: Hachez et comparez des chaînes de texte avec bcrypt. Bcrypt est une fonction de hachage de mots de passe basée sur le chiffrement Blowfish.

  crontab-generator:
    title: Générateur de Crontab
    description: Validez et générez des expressions crontab et obtenez la description lisible de la planification cron.

  http-status-codes:
    title: Codes de statut HTTP
    description: La liste de tous les codes de statut HTTP, leurs noms et leurs significations.

  sql-prettify:
    title: Formater le SQL
    description: Formatez et embellissez vos requêtes SQL en ligne (prend en charge différents dialectes SQL).

  benchmark-builder:
    title: Constructeur de benchmarks
    description: Comparez facilement le temps d'exécution de tâches avec ce constructeur de benchmarks en ligne.

  git-memo:
    title: Cheatsheet Git
    description: Git est un logiciel de gestion de versions décentralisé. Avec cette aide-mémoire, vous aurez un accès rapide aux commandes git les plus courantes.

  slugify-string:
    title: Slugifier une chaîne
    description: Rend une chaîne sûre pour les URL, noms de fichier et identifiants.

  encryption:
    title: Chiffrer / déchiffrer du texte
    description: Chiffrez du texte clair et déchiffrez du texte chiffré en utilisant des algorithmes comme AES, TripleDES, Rabbit ou RC4.

  random-port-generator:
    title: Générateur de ports aléatoires
    description: Génère des numéros de port aléatoires en dehors de la plage des ports "connus" (0-1023).

  yaml-prettify:
    title: Formater le YAML
    description: Embellissez votre chaîne YAML dans un format lisible et convivial.

  eta-calculator:
    title: Calculateur ETA
    description: Un calculateur d'ETA (Estimated Time of Arrival) pour déterminer le temps de fin approximatif d'une tâche.

  roman-numeral-converter:
    title: Convertisseur de chiffres romains
    description: Convertissez des chiffres romains en chiffres arabes et inversement.

  hmac-generator:
    title: Générateur HMAC
    description: Calcule un code d'authentification de message basé sur le hachage (HMAC) en utilisant une clé secrète et votre fonction de hachage préférée.

  bip39-generator:
    title: Générateur de phrase secrète BIP39
    description: Générez une phrase secrète BIP39 à partir d'un mnémonique existant ou aléatoire, ou obtenez le mnémonique à partir de la phrase secrète.

  base64-file-converter:
    title: Convertisseur de fichiers Base64
    description: Convertissez une chaîne, un fichier ou une image en sa représentation Base64.

  list-converter:
    title: Convertisseur de listes
    description: Cet outil peut traiter des données en colonnes et appliquer divers changements (transposer, ajouter préfixe/suffixe, inverser liste, trier liste, etc.) à chaque ligne.

  base64-string-converter:
    title: Encodeur/décodeur Base64
    description: Encodez et décodez facilement des chaînes en leur représentation Base64.

  toml-to-yaml:
    title: TOML vers YAML
    description: Analysez et convertissez TOML en YAML.

  math-evaluator:
    title: Évaluateur mathématique
    description: Une calculatrice pour évaluer des expressions mathématiques. Vous pouvez utiliser des fonctions comme sqrt, cos, sin, abs, etc.

  json-to-yaml-converter:
    title: Convertisseur JSON vers YAML
    description: Convertissez simplement du JSON en YAML avec ce convertisseur en ligne.

  url-parser:
    title: Analyseur d'URL
    description: Analysez une URL en ses différentes parties (protocole, origine, paramètres, port, nom d'utilisateur/mot de passe, ...).

  iban-validator-and-parser:
    title: Validateur et analyseur d'IBAN
    description: Validez et analysez des numéros IBAN. Vérifiez si un IBAN est valide et obtenez le pays, le BBAN, s'il s'agit d'un QR-IBAN et le format IBAN convivial.

  user-agent-parser:
    title: Analyseur User-Agent
    description: Détectez et analysez le navigateur, le moteur, l'OS, le CPU et le type/modèle d'appareil à partir d'une chaîne user-agent.

  numeronym-generator:
    title: Générateur de numéronyms
    description: Un numéronym est un mot où un nombre est utilisé pour former une abréviation. Par exemple, "i18n" est un numéronym de "internationalisation".

  case-converter:
    title: Convertisseur de casse
    description: Transformez la casse d'une chaîne et choisissez entre différents formats.

  html-entities:
    title: Échapper les entités HTML
    description: Échappez ou désé-chappez des entités HTML (remplacez des caractères comme <, >, &, " et \' par leur version HTML).

  json-prettify:
    title: Formater le JSON
    description: Embellissez votre chaîne JSON dans un format lisible et convivial.

  docker-run-to-docker-compose-converter:
    title: Convertisseur docker run vers docker-compose
    description: Transformez des commandes "docker run" en fichiers docker-compose !

  mac-address-lookup:
    title: Recherche d'adresse MAC
    description: Trouvez le fournisseur et le fabricant d'un appareil par son adresse MAC.

  mime-types:
    title: Types MIME
    description: Convertissez les types MIME en extensions de fichier et vice-versa.

  toml-to-json:
    title: TOML vers JSON
    description: Analysez et convertissez TOML en JSON.

  lorem-ipsum-generator:
    title: Générateur de Lorem ipsum
    description: Lorem ipsum est un texte de remplacement couramment utilisé pour démontrer la forme visuelle d'un document sans se baser sur un contenu significatif.

  qrcode-generator:
    title: Générateur de QR Code
    description: Générez et téléchargez un QR code pour une URL (ou du texte simple), et personnalisez les couleurs de fond et de premier plan.

  wifi-qrcode-generator:
    title: Générateur de QR Code WiFi
    description: Générez et téléchargez des codes QR pour des connexions rapides aux réseaux WiFi.

  xml-formatter:
    title: Formateur XML
    description: Embellissez votre chaîne XML dans un format lisible et convivial.

  temperature-converter:
    title: Convertisseur de température
    description: Conversions de degrés de température pour Kelvin, Celsius, Fahrenheit, Rankine, Delisle, Newton, Réaumur et Rømer.

  chmod-calculator:
    title: Calculateur Chmod
    description: Calculez vos permissions chmod et commandes avec ce calculateur chmod en ligne.

  rsa-key-pair-generator:
    title: Générateur de paires de clés RSA
    description: Générez un nouveau couple de clés RSA privée et publique au format PEM aléatoirement.

  html-wysiwyg-editor:
    title: Éditeur HTML WYSIWYG
    description: Éditeur HTML WYSIWYG en ligne riche en fonctionnalités qui génère immédiatement le code source du contenu.

  yaml-to-toml:
    title: YAML vers TOML
    description: Analysez et convertissez YAML en TOML.

  mac-address-generator:
    title: Générateur d'adresses MAC
    description: Saisissez la quantité et le préfixe. Les adresses MAC seront générées dans la casse de votre choix (majuscules ou minuscules).

  json-diff:
