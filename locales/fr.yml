    description: Transformez du texte en alphabet phonétique NATO pour la transmission orale.

  basic-auth-generator:
    title: Générateur d'authentification de base
    description: Générez un en-tête d'authentification de base Base64 à partir d'un nom d'utilisateur et d'un mot de passe.

  text-to-unicode:
