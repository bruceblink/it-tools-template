    description: Um UUID (Universally Unique Identifier) é um número de 128 bits usado para identificar informações em sistemas de computador.

  ipv4-address-converter:
    title: Conversor de endereços IPv4
    description: Converta um endereço IP para decimal, binário, hexadecimal ou mesmo uma representação IPv6.

  text-statistics:
    title: Estatísticas de texto
    description: Obtenha informações sobre um texto, o número de caracteres, palavras, seu tamanho em bytes, ...

  text-to-nato-alphabet:
    title: Texto para alfabeto OTAN
    description: Transforme texto em alfabeto fonético OTAN para transmissão oral.

  basic-auth-generator:
    title: Gerador de autenticação básica
    description: Gera um cabeçalho de autenticação básica Base64 a partir de um nome de usuário e senha.

  text-to-unicode:
    title: Texto para Unicode
    description: Analise e converta texto para Unicode e vice-versa.

  ipv4-range-expander:
    title: Expansor de intervalo IPv4
    description: Dado um endereço IPv4 inicial e final, esta ferramenta calcula uma sub-rede IPv4 válida com sua notação CIDR.

  text-diff:
    title: Diferenças de texto
    description: Compare dois textos e veja as diferenças entre eles.

  otp-generator:
    title: Gerador de códigos OTP
    description: Gere e valide senhas de uso único (OTP) baseadas em tempo para autenticação multifator.

  url-encoder:
    title: Codificar/decodificar strings URL
    description: Codifique texto em formato URL (também conhecido como "codificação percentual"), ou decodifique-o desse formato.

  text-to-binary:
    title: Texto para binário ASCII
    description: Converta texto para sua representação binária ASCII e vice-versa.
